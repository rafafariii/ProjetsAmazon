<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      CSP ajustado para Electron local:
      - Tailwind agora é compilado pelo Vite (não precisa mais de CDN externo)
      - 'unsafe-inline' em style-src é necessário para estilos injetados pelo Vite HMR
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;" />

    <title>Controle de Jornada</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
